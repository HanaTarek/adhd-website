# ================================================================
# netlify.toml  —  place at your project ROOT next to package.json
# ================================================================
# FIX: Removed the invalid [functions.node_bundle] section.
# Dependencies are now handled by netlify/functions/package.json
# which Netlify automatically installs separately for functions.
# ================================================================

[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

# Schedule: every day at 06:00 UTC
[functions."weekly-report"]
  schedule = "0 6 * * *"